<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Clean dark background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1C1E"/>
      <stop offset="100%" stop-color="#141416"/>
    </linearGradient>

    <!-- Active dot: bold warm coral -->
    <radialGradient id="activeDot" cx="0.42" cy="0.38" r="0.58">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#F4511E"/>
    </radialGradient>

    <!-- Subtle warm glow — restrained, not noisy -->
    <radialGradient id="activeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F4511E" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#F4511E" stop-opacity="0"/>
    </radialGradient>

    <!-- Shadow — clean, not overdone -->
    <filter id="dotShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background: macOS squircle -->
  <rect x="16" y="16" width="480" height="480" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Timeline vertical line — clean, single weight -->
  <line x1="186" y1="115" x2="186" y2="410"
        stroke="#3A3A3C" stroke-width="3" stroke-linecap="round"/>

  <!-- ============ Dot 3 (bottom, most faded) ============ -->
  <circle cx="186" cy="370" r="10" fill="#3A3A3C"/>
  <!-- Label lines -->
  <rect x="218" y="365" width="70" height="4" rx="2" fill="#3A3A3C"/>
  <rect x="218" y="376" width="42" height="3" rx="1.5" fill="#2C2C2E"/>

  <!-- ============ Dot 2 (middle) ============ -->
  <circle cx="186" cy="280" r="14" fill="#636366"/>
  <!-- Label lines -->
  <rect x="222" y="272" width="100" height="5" rx="2.5" fill="rgba(255,255,255,0.35)"/>
  <rect x="222" y="286" width="58" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>

  <!-- ============ Dot 1 (top — NEXT event, hero) ============ -->
  <!-- Restrained glow -->
  <ellipse cx="186" cy="175" rx="56" ry="56" fill="url(#activeGlow)"/>

  <!-- The dot itself — bold, confident -->
  <g filter="url(#dotShadow)">
    <circle cx="186" cy="175" r="28" fill="url(#activeDot)"/>
    <!-- Small inner highlight for dimension -->
    <circle cx="179" cy="167" r="8" fill="rgba(255,255,255,0.22)"/>
  </g>

  <!-- Active event labels — crisp white -->
  <rect x="232" y="161" width="140" height="7" rx="3.5" fill="rgba(255,255,255,0.90)"/>
  <rect x="232" y="178" width="80" height="5" rx="2.5" fill="#FF8A65" opacity="0.75"/>

  <!-- Time badge — flat, clean -->
  <rect x="232" y="196" width="42" height="14" rx="7" fill="rgba(244,81,30,0.18)"/>
  <rect x="240" y="201" width="26" height="4" rx="2" fill="#FF8A65" opacity="0.8"/>

  <!-- Tick marks — subtle alignment cues -->
  <line x1="178" y1="175" x2="172" y2="175"
        stroke="#F4511E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="178" y1="280" x2="174" y2="280"
        stroke="#636366" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="178" y1="370" x2="174" y2="370"
        stroke="#3A3A3C" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>