name: Xcode - Build, Analyze, and Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  xcode:
    name: Build, analyze, and test UpNext
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and analyze
        run: |
          set -o pipefail
          xcodebuild clean build analyze \
            -project UpNext.xcodeproj \
            -scheme UpNext \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project UpNext.xcodeproj \
            -scheme UpNext \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
