name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "artifacts/screenshots/**"
      - "UpNext/Resources/Assets.xcassets/AppIcon.appiconset/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble site
        run: |
          mkdir -p _site/assets
          cp site/index.html site/styles.css _site/
          cp artifacts/screenshots/popover-active-meeting-light.png _site/assets/
          cp artifacts/screenshots/popover-active-meeting-dark.png _site/assets/
          cp UpNext/Resources/Assets.xcassets/AppIcon.appiconset/icon_128x128@2x.png _site/assets/app-icon.png
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
