name: UpNext
options:
  bundleIdPrefix: com.srichand
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  UpNext:
    type: application
    platform: macOS
    sources:
      - path: UpNext
        excludes:
          - Resources/Info.plist
    settings:
      base:
        INFOPLIST_FILE: UpNext/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: UpNext/Resources/UpNext.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.srichand.UpNext
        PRODUCT_NAME: UpNext
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: true
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic

  UpNextTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: UpNextTests
    dependencies:
      - target: UpNext
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.srichand.UpNextTests
        GENERATE_INFOPLIST_FILE: true
