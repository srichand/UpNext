<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>

    <!-- Back card gradient -->
    <linearGradient id="cardBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a4e7a"/>
      <stop offset="100%" stop-color="#3a3d6b"/>
    </linearGradient>

    <!-- Middle card gradient -->
    <linearGradient id="cardMid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366a0"/>
      <stop offset="100%" stop-color="#55588a"/>
    </linearGradient>

    <!-- Front card gradient -->
    <linearGradient id="cardFront" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6d5dfc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Glow for front card -->
    <filter id="frontGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.5 0 0 0 0.3
                0 0.3 0 0 0.1
                0 0 1 0 0.5
                0 0 0 0.5 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <filter id="shadowDeep" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <!-- Time dot glow -->
    <radialGradient id="dotGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square (macOS icon shape) -->
  <rect x="16" y="16" width="480" height="480" rx="110" ry="110" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="16" y="16" width="480" height="480" rx="110" ry="110"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Back card (lowest, most offset) -->
  <g filter="url(#shadow)">
    <rect x="126" y="200" width="260" height="170" rx="20" ry="20"
          fill="url(#cardBack)" opacity="0.6"/>
  </g>

  <!-- Middle card -->
  <g filter="url(#shadow)">
    <rect x="110" y="175" width="260" height="170" rx="20" ry="20"
          fill="url(#cardMid)" opacity="0.8"/>
    <!-- Faint line on middle card -->
    <rect x="140" y="210" width="120" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="140" y="228" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- Front card (elevated, glowing) -->
  <g filter="url(#shadowDeep)">
    <rect x="94" y="130" width="280" height="180" rx="24" ry="24"
          fill="url(#cardFront)" filter="url(#frontGlow)"/>

    <!-- Meeting title line -->
    <rect x="130" y="172" width="150" height="8" rx="4" fill="rgba(255,255,255,0.9)"/>

    <!-- Meeting time line -->
    <rect x="130" y="194" width="90" height="6" rx="3" fill="rgba(255,255,255,0.45)"/>

    <!-- Small calendar dot / color indicator -->
    <circle cx="142" y="240" cy="240" r="8" fill="#c084fc" opacity="0.9"/>

    <!-- Divider -->
    <rect x="130" y="218" width="200" height="1" rx="0.5" fill="rgba(255,255,255,0.12)"/>

    <!-- Secondary detail lines -->
    <rect x="160" y="234" width="100" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
    <rect x="160" y="250" width="70" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>

    <!-- Upward chevron accent (the "up" in UpNext) -->
    <polyline points="320,190 338,168 356,190"
              fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="5"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Subtle ambient glow at top of front card -->
  <ellipse cx="234" cy="125" rx="100" ry="30" fill="url(#dotGlow)" opacity="0.4"/>
</svg>